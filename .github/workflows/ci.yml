name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/corvid_dummy_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Install dummy app dependencies
        run: |
          cd test/dummy
          bundle install

      - name: Create and migrate test database
        run: |
          cd test/dummy
          bundle exec rails db:create db:migrate

      - name: Run tests
        run: bundle exec rake test

      - name: Run BDD features
        run: bundle exec cucumber --tags "not @wip" --format progress
